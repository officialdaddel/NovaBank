gui:
  enabled: true
  title: "&9Bank"
  size: 27
  placeholder:
    use: true
    material: GRAY_STAINED_GLASS_PANE
    name: "&7"
  withdraw:
    withdraw: "&4Withdraw"
    material: RED_CONCRETE
    name: "&4Withdraw"
    description:
      - "&7Withdraw money from your bank account"
  deposit:
    title: "&aDeposit"
    material: LIME_CONCRETE
    name: "&aDeposit"
    description:
      - "&7Deposit money to your bank account"
  profile:
    name: "&e%novabank_player_name%'s bank account money"
    description: "&7Your current balance is $%novabank_balance%"