# Je berichten aanpassen
current-balance: "%novabank_prefix% &7Je huidige rekeningsaldo is: &a$%novabank_balance%"
no-permissions: "%novabank_prefix% &4Je hebt geen toestemming om dit command uit te voeren!"
wrong-usage: "%novabank_prefix% &4Gebruik: %novabank_default_commands%"
not-enough-money: "%novabank_prefix% &4Je hebt niet genoeg geld!"
invalid-amount: "%novabank_prefix% &4Ongeldig bedrag!"
deposit-money: "%novabank_prefix% &aJe hebt volgende bedrag succesvol gestort: $%novabank_deposit_amount%"
withdraw-money: "%novabank_prefix% &aJe hebt het volgende bedrag succesvol opgenomen: $%novabank_withdraw_amount%"
new-balance: "%novabank_prefix% &aJe nieuwe rekeningsaldo is: $&a%novabank_balance%"
player-not-found: "%novabank_prefix% &cSpeler %novabank_invalid_player% niet gevonden!"
reset-money-confirm: "%novabank_prefix% &cJe hebt het account van %novabank_target% succesvol gereset!"
remove-money-confirm: "%novabank_prefix% &cJe hebt $%novabank_removed_amount% van de rekening van %novabank_target% verwijderd!"
add-money-confirm: "%novabank_prefix% &aJe hebt $%novabank_added_amount% toegevoegd aan de rekening van %novabank_target%!"
set-money-confirm: "%novabank_prefix% &cJe hebt het saldo van %novabank_target% ingesteld op $%novabank_setting_amount%!"
bank-menu:
  cancel: "%novabank_prefix% &c&oGebruik CANCEL om af te breken."
  cancel-confirm: "%novabank_prefix% &cU hebt de actie succesvol geannuleerd."
  deposit: "%novabank_prefix% &aVoer het bedrag in dat je op je account wilt storten."
  withdraw: "%novabank_prefix% &aVoer het bedrag in dat je van je rekening wilt opnemen."